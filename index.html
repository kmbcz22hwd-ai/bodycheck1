<script>
const sections = [
  {
    title: "頸部與肩膀", icon: "🔝", color: "#7C9E8A", key: "neck",
    questions: [
      "早上起床後，脖子需要轉一轉才比較舒服",
      "肩膀長期有一邊比另一邊高",

  },
  {
    title: "背部與腰", icon: "🦴", color: "#8A7C9E", key: "back",
    questions: [
      "久坐超過 30 分鐘就開始腰痠",

  },
  {

    questions: [
      "睡眠時數夠但醒來還是很累",
      "睡覺容易落枕，或睡醒固定某個部位會不舒服",
      "下午固定會有一段時間特別疲勞",
      "休息後身體感覺沒有真的放鬆",
    ]
  },
  {
    title: "整體感受", icon: "🌀", color: "#9E9E7C", key: "general",
    questions: [
      "覺得自己姿勢不好，但很難維持「坐正」",
      "某個部位反覆不舒服，處理完過一陣子又回來",
      "身體緊繃但自己說不清楚哪裡出了問題",
      "曾被說「你壓力很大」但自己沒有特別感覺",
    ]
  },
];

// 各區塊的放鬆建議資料庫
const areaAdvice = {
  neck: {
    analysis: "頸肩的緊繃通常來自長時間低頭、螢幕使用，或是身體為了保護不穩定的頸椎結構而主動收縮。你的肩膀可能長期在「撐著」某個姿勢，這種保護性張力會讓肌肉很難靠休息放鬆。",
    stretches: [
      "【耳朵貼肩】坐直，將右耳慢慢靠向右肩，感覺左側頸部拉開，維持 20 秒再換邊。不要聳肩，讓重力自然帶動就好。",
      "【轉頭畫圓】頭部緩慢轉向右邊到底，停 3 秒，再慢慢轉回正面，換左邊。每天早晚各 5 次，不要快。",
      "【肩胛骨夾緊】坐正，雙手自然垂下，把兩側肩胛骨向中間夾緊，維持 5 秒再放鬆，重複 10 次，幫助肩膀回到正確位置。"
    ],
    caution: "如果轉頭時伴隨頭暈、或手臂有麻感，這不只是肌肉緊繃，建議盡快找我聊聊。"
  },
  back: {
    analysis: "腰背的問題很多時候不是腰本身的問題，而是骨盆、髖關節或胸椎的活動度不足，讓腰椎長期代償。你的腰可能一直在「幫別的地方做事」，才會這麼累。",
    stretches: [
      "【貓牛式】四足跪姿，吸氣時肚子下沉、抬頭，吐氣時拱背、低頭，緩慢做 10 次，喚醒脊椎的活動度。",
      "【坐姿前彎】坐在椅子邊緣，雙腳與肩同寬，身體緩慢向前趴，讓背部自然下沉，維持 30 秒。不要強迫，讓身體慢慢放開。",
      "【躺姿抱膝】平躺，雙手環抱雙膝靠向胸口，輕輕左右搖晃，維持 30 秒。這個動作幫助腰椎減壓。"
    ],
    caution: "如果腰痛延伸到臀部或大腿，或是腳有麻感，代表神經可能已受影響，需要盡快處理。"
  },
  arm: {
    analysis: "手麻或手臂無力通常是頸椎或胸廓出口的問題，不是手本身。神經或血管在某個地方被壓迫，才會讓手有這些感覺。這種情況靠按摩手臂效果很有限，需要找到源頭。",
    stretches: [
      "【胸廓伸展】站立，右手扶門框，身體慢慢向左轉，感覺右側胸口和手臂前側拉開，維持 20 秒再換邊。",
      "【手腕轉圈】雙手握拳，緩慢做手腕繞圈，順時針 10 圈、逆時針 10 圈，放鬆前臂張力。",
      "【聳肩放鬆】雙肩同時向上聳到最高，維持 3 秒，然後快速放下。重複 10 次，幫助肩頸神經通道減壓。"
    ],
    caution: "如果麻感持續超過幾分鐘、或特定姿勢會加重，請盡快來讓我評估，這類問題拖越久越難處理。"
  },
  sleep: {
    analysis: "睡眠品質差或醒來依然疲勞，很多時候是身體的保護張力太高，讓神經系統在睡眠中也無法真正放鬆。身體覺得「不安全」，就不會讓你進入深層休息。",
    stretches: [
      "【睡前腹式呼吸】躺平，一手放胸口、一手放肚子，吸氣讓肚子鼓起，吐氣讓肚子下沉。做 10 次，幫助神經系統切換到放鬆模式。",
      "【睡前腿部抬高】躺平，雙腿靠牆往上伸直，維持 5 分鐘。促進下肢血液回流，減少睡眠中的腿部不適。",
      "【枕頭高度調整】側睡時枕頭高度應等於肩寬，讓頸椎維持直線。仰睡時枕頭不需要太高，只要能撐住頸部弧度就好。"
    ],
    caution: "如果睡眠問題已持續超過一個月、伴隨早醒或完全無法入睡，建議同時諮詢醫師評估是否有其他因素。"
  },
  general: {
    analysis: "身體整體的緊繃感、姿勢難以維持，通常代表你的核心支撐系統需要重新啟動。身體為了「維持平衡」，會讓某些肌肉長期處於高張力狀態，這就是為什麼你很難真正放鬆。",
    stretches: [
      "【站姿靠牆】後腦、肩胛骨、臀部、腳跟都貼牆站立，維持 1 分鐘。讓身體感受「正確位置」是什麼感覺。",
      "【深蹲靠牆】背靠牆，腳離牆約一步，緩慢下蹲到大腿與地面平行，維持 30 秒。啟動深層核心和髖關節。",
      "【每小時起身動一動】久坐每 45–60 分鐘站起來走動 2 分鐘，打斷身體的代償模式，比任何拉伸都重要。"
    ],
    caution: "如果你長期覺得「身體不是自己的」或無論怎麼動都不舒服，這通常代表全身代償已經很深，需要系統性調整，不是靠拉伸就能解決的。"
  }
};

const answers = {};
let checkedCount = 0;
const total = 22;

function render() {
  const container = document.getElementById("sections");
  sections.forEach((sec, si) => {
    const div = document.createElement("div");
    div.className = "section";
    div.innerHTML = `<div class="section-header" style="background:${sec.color}15;border-bottom:1px solid ${sec.color}30"><span>${sec.icon}</span><h2 style="color:${sec.color}">${sec.title}</h2></div>`;
    sec.questions.forEach((q, qi) => {
      const key = `${si}-${qi}`;
      const row = document.createElement("div");
      row.className = "question";
      row.id = `row-${key}`;
      row.innerHTML = `<div class="checkbox" id="cb-${key}" style="--color:${sec.color}"></div><label>${q}</label>`;
      row.onclick = () => toggle(key, sec.color);
      div.appendChild(row);
    });
    container.appendChild(div);
  });
}

function toggle(key, color) {
  answers[key] = !answers[key];
  const cb = document.getElementById(`cb-${key}`);
  const row = document.getElementById(`row-${key}`);
  if (answers[key]) { cb.classList.add("checked"); row.classList.add("checked-row"); checkedCount++; }
  else { cb.classList.remove("checked"); row.classList.remove("checked-row"); checkedCount--; }
  document.getElementById("checked-count").textContent = `已勾選 ${checkedCount} 項`;
  document.getElementById("progress-fill").style.width = `${(checkedCount / total) * 100}%`;
}

function updateName() {
  const name = document.getElementById("user-name").value.trim();
  const line = document.getElementById("result-name-line");
  if (line) line.textContent = name ? `${name}，想了解更多或預約調整` : "想了解更多或預約調整";
}

function getSectionCounts() {
  return sections.map((sec, si) => ({
    key: sec.key,
    title: sec.title,
    count: sec.questions.filter((_, qi) => answers[`${si}-${qi}`]).length,
    total: sec.questions.length
  }));
}

function generateAdvice(sectionCounts) {
  const active = sectionCounts.filter(s => s.count > 0).sort((a, b) => (b.count/b.total) - (a.count/a.total));
  if (active.length === 0) return "<p style='font-size:14px;color:#666'>請先勾選症狀再查看建議。</p>";

  let html = "";

  // 分析
  const analyses = active.map(s => areaAdvice[s.key].analysis);
  html += `<div class="ai-section"><div class="ai-section-title">📋 身體狀態分析</div><div class="ai-section-content">`;
  if (active.length === 1) {
    html += analyses[0];
  } else {
    html += `你目前主要有 ${active.map(s => s.title).join("、")} 的問題。${analyses[0]} 這些區域的問題往往互相影響，需要從整體來看。`;
  }
  html += `</div></div>`;

  // 放鬆動作：取前兩個最嚴重區塊各1個動作，再加一個整體動作
  html += `<div class="ai-section"><div class="ai-section-title">🧘 建議放鬆動作</div><div class="ai-section-content">`;
  const moves = [];
  active.slice(0, 2).forEach(s => {
    const advice = areaAdvice[s.key];
    const idx = Math.min(s.count - 1, advice.stretches.length - 1);
    moves.push(advice.stretches[idx]);
  });
  if (active.length >= 3 || (active.length >= 1 && active[0].key === "general")) {
    moves.push(areaAdvice["general"].stretches[2]);
  } else if (moves.length < 3) {
    const first = areaAdvice[active[0].key];
    if (first.stretches[1] && !moves.includes(first.stretches[1])) moves.push(first.stretches[1]);
  }
  html += moves.slice(0, 3).map((m, i) => `<p style="margin-bottom:8px">${i+1}. ${m}</p>`).join("");
  html += `</div></div>`;

  // 注意事項：取最嚴重區塊的
  html += `<div class="ai-section"><div class="ai-section-title">⚠️ 需要注意的事</div><div class="ai-section-content">${areaAdvice[active[0].key].caution}</div></div>`;

  return html;
}

function showResult() {
  const n = checkedCount;
  if (n === 0) { alert("請至少勾選一項症狀"); return; }

  let level, emoji, desc, suggest, color;
  if (n <= 3) {
    level = "身體狀態穩定"; emoji = "🟢"; color = "#7C9E8A";
    desc = "目前身體的保護張力在可控範圍內。建議維持現有的作息，定期做一些伸展保養，預防累積。";
    suggest = "可每 2–3 個月做一次預防性調整，讓身體保持在好的狀態。";
  } else if (n <= 8) {
    level = "輕度張力累積"; emoji = "🟡"; color = "#B09040";
    desc = "身體已經開始出現保護性張力，某些部位在代償其他區域的壓力。這個階段調整效果最好，不需要等到很痛才來。";
    suggest = "建議近期安排 1–2 次調整，了解自己身體目前的狀態。";
  } else if (n <= 14) {
    level = "中度張力累積"; emoji = "🟠"; color = "#B06030";
    desc = "身體的代償已經擴散到多個區域，某些症狀可能反覆出現。這時候需要系統性的調整，而不只是放鬆單一部位。";
    suggest = "建議盡快安排調整，並連續做幾次讓身體逐漸穩定下來。";
  } else {
    level = "高度張力累積"; emoji = "🔴"; color = "#A03030";
    desc = "身體長期在保護模式下運作，已經出現明顯的代償反應。很多不舒服可能你已經習慣了，但這不代表是正常的。";
    suggest = "建議盡快來聊聊，讓我了解你的狀況，一起找出調整方向。";
  }

  document.getElementById("result-top").style.background = `linear-gradient(135deg, ${color}, ${color}AA)`;
  document.getElementById("result-emoji").textContent = emoji;
  document.getElementById("result-title").textContent = level;
  document.getElementById("result-count").textContent = `勾選了 ${n} 項`;
  document.getElementById("result-desc").textContent = desc;
  document.getElementById("result-suggest").textContent = suggest;
  document.getElementById("result-box").style.borderLeftColor = color;

  const sectionCounts = getSectionCounts();
  document.getElementById("ai-content").innerHTML = generateAdvice(sectionCounts);

  const el = document.getElementById("result");
  el.classList.add("show");
  el.scrollIntoView({ behavior: "smooth", block: "start" });
  updateName();

  const name = document.getElementById("user-name").value.trim();
  const nameText = name ? `我是 ${name}，` : "";
  const msg = `你好，${nameText}我剛做完身體張力自我檢測，結果是「${level}」（勾選了 ${n} 項）。想進一步了解我的狀況，請問方便諮詢嗎？`;
  document.getElementById("line-btn").href = `https://line.me/R/oaMessage/@413mwndv/?${encodeURIComponent(msg)}`;
  document.getElementById("line-btn").style.display = "block";
}

render();
</script>
