<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>身體張力自我檢測表｜推拿師 Sian</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #F4F1ED;
    font-family: "Noto Sans TC", "PingFang TC", sans-serif;
    color: #1A1A1A;
    padding: 28px 16px 60px;
    min-height: 100vh;
  }
  .header { text-align: center; margin-bottom: 28px; }
  .header .sub { font-size: 11px; color: #AAA; letter-spacing: 3px; margin-bottom: 8px; }
  .header h1 { font-size: 22px; font-weight: 700; line-height: 1.4; }
  .header p { margin-top: 10px; font-size: 13px; color: #888; line-height: 1.7; }

  .progress-wrap { max-width: 480px; margin: 0 auto 24px; }
  .progress-label { display: flex; justify-content: space-between; font-size: 12px; color: #AAA; margin-bottom: 6px; }
  .progress-bar { height: 4px; background: #E0DCD6; border-radius: 2px; }
  .progress-fill { height: 100%; background: #7C9E8A; border-radius: 2px; transition: width 0.3s; }

  .section { max-width: 480px; margin: 0 auto 16px; background: #fff; border-radius: 18px; overflow: hidden; box-shadow: 0 2px 16px rgba(0,0,0,0.06); }
  .section-header { display: flex; align-items: center; gap: 10px; padding: 14px 20px; border-bottom: 1px solid rgba(0,0,0,0.06); }
  .section-header span { font-size: 20px; }
  .section-header h2 { font-size: 15px; font-weight: 700; }

  .question { display: flex; align-items: flex-start; gap: 12px; padding: 12px 20px; cursor: pointer; border-bottom: 1px solid #F4F1ED; transition: background 0.15s; }
  .question:last-child { border-bottom: none; }
  .question:active { background: #F8F6F3; }
  .checkbox { width: 22px; height: 22px; border-radius: 6px; border: 2px solid #D0CBC4; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all 0.15s; margin-top: 2px; }
  .checkbox.checked { background: var(--color); border-color: var(--color); }
  .checkbox.checked::after { content: "✓"; color: #fff; font-size: 13px; font-weight: 700; }
  .question.checked-row { background: rgba(0,0,0,0.02); }
  .question label { font-size: 14px; color: #555; line-height: 1.7; cursor: pointer; }
  .question.checked-row label { color: #222; font-weight: 500; }

  .btn { display: block; max-width: 480px; margin: 20px auto 0; width: 100%; padding: 15px; border-radius: 14px; border: none; background: #222; color: #fff; font-size: 15px; font-weight: 700; font-family: inherit; cursor: pointer; }

  .result { max-width: 480px; margin: 20px auto 0; background: #fff; border-radius: 20px; overflow: hidden; box-shadow: 0 4px 28px rgba(0,0,0,0.08); display: none; }
  .result.show { display: block; }
  .result-top { padding: 28px 24px; text-align: center; }
  .result-emoji { font-size: 44px; margin-bottom: 10px; }
  .result-title { color: #fff; font-size: 19px; font-weight: 700; }
  .result-count { color: rgba(255,255,255,0.8); font-size: 13px; margin-top: 4px; }
  .result-body { padding: 22px 24px; }
  .result-desc { font-size: 14px; color: #444; line-height: 1.85; margin-bottom: 14px; }
  .result-box { padding: 14px 16px; background: #F8F6F3; border-radius: 12px; border-left: 3px solid #888; }
  .result-box .label { font-size: 11px; color: #AAA; margin-bottom: 4px; letter-spacing: 1px; }
  .result-box p { font-size: 14px; color: #333; line-height: 1.7; }
  .result-line { margin-top: 18px; padding: 16px; background: #F0F7F3; border-radius: 12px; text-align: center; }
  .result-line .t1 { font-size: 13px; color: #4A9068; font-weight: 600; margin-bottom: 4px; }
  .result-line .t2 { font-size: 16px; color: #222; font-weight: 700; }
  .name-wrap { max-width: 480px; margin: 20px auto 0; background: #fff; border-radius: 18px; padding: 20px; box-shadow: 0 2px 16px rgba(0,0,0,0.06); }
  .name-wrap label { display: block; font-size: 13px; color: #888; margin-bottom: 8px; }
  .name-wrap input { width: 100%; padding: 12px 14px; border-radius: 10px; border: 1.5px solid #E0DCD6; font-size: 15px; font-family: inherit; color: #222; outline: none; transition: border 0.2s; }
  .name-wrap input:focus { border-color: #7C9E8A; }
  .line-btn { display: block; max-width: 480px; margin: 14px auto 0; width: 100%; padding: 16px; border-radius: 14px; border: none; background: #06C755; color: #fff; font-size: 16px; font-weight: 700; font-family: inherit; cursor: pointer; text-align: center; text-decoration: none; letter-spacing: 0.5px; }
</style>
</head>
<body>

<div class="header">
  <div class="sub">推拿師 Sian 製作</div>
  <h1>身體張力<br/>自我檢測表</h1>
  <p>勾選最近三個月內<br/>有感受到的狀況</p>
</div>

<div class="name-wrap">
  <label>你的名字是？</label>
  <input type="text" id="user-name" placeholder="輸入你的名字" oninput="updateName()" />
</div>

<div style="max-width:480px;margin:16px auto 0;height:1px;background:#E8E4DE;"></div>

<div class="progress-wrap" style="margin-top:20px;">
  <div class="progress-label">
    <span id="checked-count">已勾選 0 項</span>
    <span>共 22 項</span>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
</div>

<div id="sections"></div>

<button class="btn" onclick="showResult()">查看我的身體狀態 →</button>

<div class="result" id="result">
  <div class="result-top" id="result-top">
    <div class="result-emoji" id="result-emoji"></div>
    <div class="result-title" id="result-title"></div>
    <div class="result-count" id="result-count"></div>
  </div>
  <div class="result-body">
    <p class="result-desc" id="result-desc"></p>
    <div class="result-box" id="result-box">
      <div class="label">建議</div>
      <p id="result-suggest"></p>
    </div>
    <div class="result-line">
      <div class="t1" id="result-name-line">想了解更多或預約調整</div>
      <div class="t2" style="font-size:13px;color:#666;margin-top:4px;">點下方按鈕，直接在 LINE 跟我說你的狀況</div>
    </div>
  </div>
</div>

<a class="line-btn" id="line-btn" href="https://line.me/R/ti/p/@413mwndv" target="_blank">
  💬 加入 LINE 諮詢 @413mwndv
</a>

<script>
const sections = [
  {
    title: "頸部與肩膀", icon: "🔝", color: "#7C9E8A",
    questions: [
      "早上起床後，脖子需要轉一轉才比較舒服",
      "肩膀長期有一邊比另一邊高",
      "轉頭時有角度限制，或會有緊繃感",
      "肩頸很容易痠，但休息後又回來",
      "常常覺得肩膀像在扛重物",
    ]
  },
  {
    title: "背部與腰", icon: "🦴", color: "#8A7C9E",
    questions: [
      "久坐超過 30 分鐘就開始腰痠",
      "起身的瞬間腰會有卡住或需要撐一下的感覺",
      "睡覺翻身時背或腰有不舒服",
      "站著超過 20 分鐘就覺得腰很累",
      "腰痛的位置有時候說不清楚在哪裡",
    ]
  },
  {
    title: "手部與上肢", icon: "🖐️", color: "#9E8A7C",
    questions: [
      "手或手指偶爾會有麻麻的感覺",
      "手舉高或往後伸時有緊繃或卡卡的感覺",
      "常常覺得手臂沉重或無力",
      "握力有時候突然變差",
    ]
  },
  {
    title: "睡眠與疲勞", icon: "😴", color: "#7C8A9E",
    questions: [
      "睡眠時數夠但醒來還是很累",
      "睡覺容易落枕，或睡醒固定某個部位會不舒服",
      "下午固定會有一段時間特別疲勞",
      "休息後身體感覺沒有真的放鬆",
    ]
  },
  {
    title: "整體感受", icon: "🌀", color: "#9E9E7C",
    questions: [
      "覺得自己姿勢不好，但很難維持「坐正」",
      "某個部位反覆不舒服，處理完過一陣子又回來",
      "身體緊繃但自己說不清楚哪裡出了問題",
      "曾被說「你壓力很大」但自己沒有特別感覺",
    ]
  },
];

const answers = {};
let checkedCount = 0;
const total = 22;

function render() {
  const container = document.getElementById("sections");
  sections.forEach((sec, si) => {
    const div = document.createElement("div");
    div.className = "section";
    div.innerHTML = `
      <div class="section-header" style="background:${sec.color}15; border-bottom:1px solid ${sec.color}30">
        <span>${sec.icon}</span>
        <h2 style="color:${sec.color}">${sec.title}</h2>
      </div>
    `;
    sec.questions.forEach((q, qi) => {
      const key = `${si}-${qi}`;
      const row = document.createElement("div");
      row.className = "question";
      row.id = `row-${key}`;
      row.innerHTML = `
        <div class="checkbox" id="cb-${key}" style="--color:${sec.color}"></div>
        <label>${q}</label>
      `;
      row.onclick = () => toggle(key, sec.color);
      div.appendChild(row);
    });
    container.appendChild(div);
  });
}

function toggle(key, color) {
  answers[key] = !answers[key];
  const cb = document.getElementById(`cb-${key}`);
  const row = document.getElementById(`row-${key}`);
  if (answers[key]) {
    cb.classList.add("checked");
    row.classList.add("checked-row");
    checkedCount++;
  } else {
    cb.classList.remove("checked");
    row.classList.remove("checked-row");
    checkedCount--;
  }
  document.getElementById("checked-count").textContent = `已勾選 ${checkedCount} 項`;
  document.getElementById("progress-fill").style.width = `${(checkedCount / total) * 100}%`;
}

function updateName() {
  const name = document.getElementById("user-name").value.trim();
  const line = document.getElementById("result-name-line");
  if (line) {
    line.textContent = name ? `${name}，想了解更多或預約調整` : "想了解更多或預約調整";
  }
}

function showResult() {
  const n = checkedCount;
  let level, emoji, desc, suggest, color;
  if (n <= 3) {
    level = "身體狀態穩定"; emoji = "🟢"; color = "#7C9E8A";
    desc = "目前身體的保護張力在可控範圍內。建議維持現有的作息，定期做一些伸展保養，預防累積。";
    suggest = "可每 2–3 個月做一次預防性調整，讓身體保持在好的狀態。";
  } else if (n <= 8) {
    level = "輕度張力累積"; emoji = "🟡"; color = "#B09040";
    desc = "身體已經開始出現保護性張力，某些部位在代償其他區域的壓力。這個階段調整效果最好，不需要等到很痛才來。";
    suggest = "建議近期安排 1–2 次調整，了解自己身體目前的狀態。";
  } else if (n <= 14) {
    level = "中度張力累積"; emoji = "🟠"; color = "#B06030";
    desc = "身體的代償已經擴散到多個區域，某些症狀可能反覆出現。這時候需要系統性的調整，而不只是放鬆單一部位。";
    suggest = "建議盡快安排調整，並連續做幾次讓身體逐漸穩定下來。";
  } else {
    level = "高度張力累積"; emoji = "🔴"; color = "#A03030";
    desc = "身體長期在保護模式下運作，已經出現明顯的代償反應。很多不舒服可能你已經習慣了，但這不代表是正常的。";
    suggest = "建議盡快來聊聊，讓我了解你的狀況，一起找出調整方向。";
  }

  document.getElementById("result-top").style.background = `linear-gradient(135deg, ${color}, ${color}AA)`;
  document.getElementById("result-emoji").textContent = emoji;
  document.getElementById("result-title").textContent = level;
  document.getElementById("result-count").textContent = `勾選了 ${n} 項`;
  document.getElementById("result-desc").textContent = desc;
  document.getElementById("result-suggest").textContent = suggest;
  document.getElementById("result-box").style.borderLeftColor = color;

  const el = document.getElementById("result");
  el.classList.add("show");
  el.scrollIntoView({ behavior: "smooth", block: "start" });
  updateName();
  // 自動帶入名字＋結果到 LINE 訊息
  const name = document.getElementById("user-name").value.trim();
  const nameText = name ? `我是 ${name}，` : "";
  const msg = `你好，${nameText}我剛做完身體張力自我檢測，結果是「${level}」（勾選了 ${n} 項）。想進一步了解我的狀況，請問方便諮詢嗎？`;
  const encoded = encodeURIComponent(msg);
  document.getElementById("line-btn").href = `https://line.me/R/oaMessage/@413mwndv/?${encoded}`;
  document.getElementById("line-btn").style.display = "block";
}

render();
</script>
</body>
</html>
